<svg viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">
  <!-- Background -->
  <rect width="900" height="520" fill="#0d1117" rx="8"/>
  <!-- Top bar -->
  <rect width="900" height="44" fill="#161b22" rx="0"/>
  <rect width="900" height="1" y="44" fill="#30363d"/>
  <circle cx="20" cy="22" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="22" r="6" fill="#febc2e"/>
  <circle cx="60" cy="22" r="6" fill="#28c840"/>
  <text x="430" y="28" text-anchor="middle" fill="#8b949e" font-size="13">MemOS Dashboard</text>

  <!-- Left panel: graph area -->
  <rect x="0" y="44" width="610" height="476" fill="#0d1117"/>

  <!-- Graph nodes - person type -->
  <circle cx="180" cy="200" r="22" fill="#534AB7" opacity="0.9"/>
  <text x="180" y="205" text-anchor="middle" fill="#EEEDFE" font-size="10">person</text>

  <!-- Graph nodes - project type (bigger = higher importance) -->
  <circle cx="320" cy="160" r="32" fill="#1D9E75" opacity="0.9"/>
  <text x="320" y="157" text-anchor="middle" fill="#E1F5EE" font-size="10">project</text>
  <text x="320" y="170" text-anchor="middle" fill="#E1F5EE" font-size="9">0.92</text>

  <!-- Graph nodes - decision -->
  <circle cx="450" cy="240" r="18" fill="#BA7517" opacity="0.85"/>
  <text x="450" y="245" text-anchor="middle" fill="#FAEEDA" font-size="9">decision</text>

  <!-- Graph nodes - preference (pinned, bright) -->
  <circle cx="280" cy="310" r="26" fill="#1D9E75" opacity="0.95"/>
  <circle cx="280" cy="310" r="29" fill="none" stroke="#5DCAA5" stroke-width="2" stroke-dasharray="4 2"/>
  <text x="280" y="307" text-anchor="middle" fill="#E1F5EE" font-size="10">pref</text>
  <text x="280" y="319" text-anchor="middle" fill="#9FE1CB" font-size="9">pinned</text>

  <!-- Graph nodes - fact (fading) -->
  <circle cx="420" cy="360" r="12" fill="#444441" opacity="0.7"/>
  <text x="420" y="364" text-anchor="middle" fill="#8b949e" font-size="9">fact</text>

  <circle cx="150" cy="340" r="15" fill="#534AB7" opacity="0.6"/>
  <text x="150" y="344" text-anchor="middle" fill="#EEEDFE" font-size="9">fact</text>

  <circle cx="500" cy="150" r="14" fill="#993556" opacity="0.75"/>
  <text x="500" y="154" text-anchor="middle" fill="#FBEAF0" font-size="9">event</text>

  <!-- Edges -->
  <line x1="198" y1="212" x2="294" y2="174" stroke="#30363d" stroke-width="1.5"/>
  <line x1="340" y1="178" x2="436" y2="228" stroke="#30363d" stroke-width="1.5"/>
  <line x1="305" y1="185" x2="285" y2="286" stroke="#30363d" stroke-width="1.5"/>
  <line x1="432" y1="248" x2="420" y2="348" stroke="#30363d" stroke-width="1"/>
  <line x1="180" y1="222" x2="158" y2="326" stroke="#30363d" stroke-width="1"/>
  <line x1="338" y1="148" x2="492" y2="156" stroke="#30363d" stroke-width="1"/>

  <!-- Right panel -->
  <rect x="610" y="44" width="1" height="476" fill="#30363d"/>
  <rect x="611" y="44" width="289" height="476" fill="#161b22"/>

  <!-- Stats row -->
  <rect x="623" y="56" width="80" height="52" fill="#0d1117" rx="6"/>
  <text x="663" y="74" text-anchor="middle" fill="#8b949e" font-size="10">nodes</text>
  <text x="663" y="96" text-anchor="middle" fill="#e6edf3" font-size="22" font-weight="600">24</text>

  <rect x="713" y="56" width="80" height="52" fill="#0d1117" rx="6"/>
  <text x="753" y="74" text-anchor="middle" fill="#8b949e" font-size="10">avg imp.</text>
  <text x="753" y="96" text-anchor="middle" fill="#e6edf3" font-size="22" font-weight="600">0.61</text>

  <rect x="803" y="56" width="78" height="52" fill="#0d1117" rx="6"/>
  <text x="842" y="74" text-anchor="middle" fill="#8b949e" font-size="10">pinned</text>
  <text x="842" y="96" text-anchor="middle" fill="#5DCAA5" font-size="22" font-weight="600">3</text>

  <!-- Divider -->
  <rect x="623" y="118" width="258" height="1" fill="#30363d"/>

  <!-- Query box -->
  <text x="623" y="136" fill="#8b949e" font-size="11">Query memory</text>
  <rect x="623" y="142" width="258" height="32" fill="#0d1117" rx="4" stroke="#30363d" stroke-width="1"/>
  <text x="635" y="163" fill="#8b949e" font-size="11">what am I working on?</text>

  <rect x="623" y="182" width="258" height="28" fill="#1D9E75" rx="4" opacity="0.15" stroke="#1D9E75" stroke-width="1"/>
  <text x="752" y="200" text-anchor="middle" fill="#5DCAA5" font-size="12">Retrieve context ↗</text>

  <!-- Divider -->
  <rect x="623" y="220" width="258" height="1" fill="#30363d"/>

  <!-- Result context -->
  <text x="623" y="238" fill="#8b949e" font-size="10">Retrieved context</text>
  <rect x="623" y="244" width="258" height="110" fill="#0d1117" rx="4" stroke="#30363d" stroke-width="1"/>
  <text x="633" y="261" fill="#8b949e" font-size="9">[MEMORY CONTEXT]</text>
  <text x="633" y="276" fill="#5DCAA5" font-size="9">1. [PROJECT] building MemOS…</text>
  <text x="643" y="288" fill="#6e7681" font-size="8">importance=0.92, 2h ago</text>
  <text x="633" y="303" fill="#7F77DD" font-size="9">2. [PREFERENCE] forgetting engine…</text>
  <text x="643" y="315" fill="#6e7681" font-size="8">importance=0.84, pinned</text>
  <text x="633" y="330" fill="#BA7517" font-size="9">3. [DECISION] React dashboard…</text>
  <text x="643" y="342" fill="#6e7681" font-size="8">importance=0.71, 6h ago</text>

  <!-- Divider -->
  <rect x="623" y="364" width="258" height="1" fill="#30363d"/>

  <!-- Selected node detail -->
  <text x="623" y="382" fill="#8b949e" font-size="10">Selected node</text>
  <rect x="623" y="388" width="258" height="106" fill="#0d1117" rx="4" stroke="#1D9E75" stroke-width="1"/>
  <rect x="623" y="388" width="258" height="24" fill="#1D9E75" rx="4" opacity="0.15"/>
  <text x="633" y="404" fill="#5DCAA5" font-size="10" font-weight="600">PROJECT</text>
  <text x="780" y="404" fill="#6e7681" font-size="9">importance: 0.92</text>
  <text x="633" y="422" fill="#e6edf3" font-size="10">building MemOS as a local-first</text>
  <text x="633" y="435" fill="#e6edf3" font-size="10">memory layer for LLMs</text>
  <text x="633" y="452" fill="#6e7681" font-size="9">accessed 2h ago  ·  4 times</text>
  <rect x="633" y="462" width="100" height="22" fill="#21262d" rx="4" stroke="#30363d" stroke-width="1"/>
  <text x="683" y="477" text-anchor="middle" fill="#8b949e" font-size="10">Forget node</text>

  <!-- Legend bottom left -->
  <circle cx="20" cy="478" r="6" fill="#1D9E75"/>
  <text x="32" y="482" fill="#8b949e" font-size="9">project</text>
  <circle cx="80" cy="478" r="6" fill="#534AB7"/>
  <text x="92" y="482" fill="#8b949e" font-size="9">person</text>
  <circle cx="140" cy="478" r="6" fill="#BA7517"/>
  <text x="152" y="482" fill="#8b949e" font-size="9">decision</text>
  <circle cx="210" cy="478" r="6" fill="#993556"/>
  <text x="222" y="482" fill="#8b949e" font-size="9">event</text>
  <text x="290" y="482" fill="#6e7681" font-size="9">node size = importance</text>
</svg>
