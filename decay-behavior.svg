<svg viewBox="0 0 760 320" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">
  <rect width="760" height="320" fill="#0d1117" rx="8"/>

  <!-- Title -->
  <text x="380" y="28" text-anchor="middle" fill="#e6edf3" font-size="14" font-weight="600">Memory Decay Over Time</text>
  <text x="380" y="46" text-anchor="middle" fill="#8b949e" font-size="11">importance × e^(−0.008 × hours)  ·  pinned floor = 0.30</text>

  <!-- Grid -->
  <line x1="80" y1="60" x2="720" y2="60" stroke="#21262d" stroke-width="1"/>
  <line x1="80" y1="107" x2="720" y2="107" stroke="#21262d" stroke-width="1"/>
  <line x1="80" y1="154" x2="720" y2="154" stroke="#21262d" stroke-width="1"/>
  <line x1="80" y1="201" x2="720" y2="201" stroke="#21262d" stroke-width="1"/>
  <line x1="80" y1="248" x2="720" y2="248" stroke="#21262d" stroke-width="1"/>
  <line x1="80" y1="280" x2="720" y2="280" stroke="#30363d" stroke-width="1"/>

  <!-- Y axis labels -->
  <text x="70" y="64" text-anchor="end" fill="#8b949e" font-size="10">1.0</text>
  <text x="70" y="111" text-anchor="end" fill="#8b949e" font-size="10">0.8</text>
  <text x="70" y="158" text-anchor="end" fill="#8b949e" font-size="10">0.6</text>
  <text x="70" y="205" text-anchor="end" fill="#8b949e" font-size="10">0.4</text>
  <text x="70" y="252" text-anchor="end" fill="#8b949e" font-size="10">0.2</text>
  <text x="70" y="284" text-anchor="end" fill="#8b949e" font-size="10">0.0</text>

  <!-- X axis labels -->
  <text x="80" y="297" text-anchor="middle" fill="#8b949e" font-size="10">0h</text>
  <text x="186" y="297" text-anchor="middle" fill="#8b949e" font-size="10">24h</text>
  <text x="292" y="297" text-anchor="middle" fill="#8b949e" font-size="10">3d</text>
  <text x="398" y="297" text-anchor="middle" fill="#8b949e" font-size="10">7d</text>
  <text x="504" y="297" text-anchor="middle" fill="#8b949e" font-size="10">10d</text>
  <text x="610" y="297" text-anchor="middle" fill="#8b949e" font-size="10">14d</text>
  <text x="720" y="297" text-anchor="middle" fill="#8b949e" font-size="10">15.6d</text>

  <!-- X axis label -->
  <text x="400" y="314" text-anchor="middle" fill="#6e7681" font-size="10">hours since last access</text>

  <!-- Pinned floor line -->
  <line x1="80" y1="201" x2="720" y2="201" stroke="#1D9E75" stroke-width="1" stroke-dasharray="6 4" opacity="0.5"/>
  <text x="726" y="204" fill="#5DCAA5" font-size="9">floor</text>

  <!-- Prune threshold line -->
  <line x1="80" y1="267" x2="720" y2="267" stroke="#E24B4A" stroke-width="1" stroke-dasharray="4 4" opacity="0.4"/>
  <text x="726" y="270" fill="#E24B4A" font-size="9">prune</text>

  <!-- Regular memory curve: importance=1.0, decay=0.008
       Points: (0h,1.0) (24h,0.825) (72h,0.562) (120h,0.383) (168h,0.261) (240h,0.150) (336h,0.067) (375h,0.050)
       x scale: 0h=80, 375h=720 → 640/375 = 1.707 px/hr
       y scale: 0.0=280, 1.0=60 → 220px range
  -->
  <path d="M80,60 C130,71 186,98 292,160 S398,207 504,238 S610,264 680,272 L720,274"
        fill="none" stroke="#888780" stroke-width="2" opacity="0.8"/>

  <!-- Pinned memory curve: same until floor -->
  <path d="M80,60 C130,71 186,98 292,160 S370,198 420,201 L720,201"
        fill="none" stroke="#1D9E75" stroke-width="2.5"/>

  <!-- Reinforced memory: gets boosted at 24h, 72h -->
  <path d="M80,60 C130,71 160,98 186,111 L186,70 C220,78 260,102 292,130 L292,95 C340,105 400,140 504,180 S620,210 720,215"
        fill="none" stroke="#534AB7" stroke-width="2" stroke-dasharray="none"/>

  <!-- Dots at key points - regular -->
  <circle cx="80" cy="60" r="4" fill="#888780"/>
  <circle cx="186" cy="111" r="4" fill="#888780"/>
  <circle cx="292" cy="160" r="4" fill="#888780"/>
  <circle cx="504" cy="238" r="4" fill="#888780"/>
  <circle cx="720" cy="274" r="4" fill="#E24B4A"/>

  <!-- Dots at key points - pinned -->
  <circle cx="80" cy="60" r="4" fill="#1D9E75"/>
  <circle cx="420" cy="201" r="5" fill="#1D9E75"/>

  <!-- Reinforcement boost markers -->
  <line x1="186" y1="70" x2="186" y2="111" stroke="#534AB7" stroke-width="1.5" stroke-dasharray="3 2"/>
  <text x="188" y="66" fill="#7F77DD" font-size="9">+boost</text>
  <line x1="292" y1="95" x2="292" y2="130" stroke="#534AB7" stroke-width="1.5" stroke-dasharray="3 2"/>
  <text x="294" y="91" fill="#7F77DD" font-size="9">+boost</text>

  <!-- Annotations -->
  <text x="86" y="57" fill="#8b949e" font-size="9">1.00</text>
  <text x="192" y="108" fill="#8b949e" font-size="9">0.83</text>
  <text x="298" y="157" fill="#8b949e" font-size="9">0.56</text>
  <text x="510" y="235" fill="#8b949e" font-size="9">0.15</text>
  <text x="700" y="270" fill="#E24B4A" font-size="9">0.05</text>
  <text x="426" y="197" fill="#5DCAA5" font-size="9">0.30</text>

  <!-- Legend -->
  <line x1="88" y1="308" x2="112" y2="308" stroke="#888780" stroke-width="2"/>
  <text x="118" y="312" fill="#8b949e" font-size="10">regular memory</text>
  <line x1="240" y1="308" x2="264" y2="308" stroke="#1D9E75" stroke-width="2.5"/>
  <text x="270" y="312" fill="#5DCAA5" font-size="10">pinned (!remember)</text>
  <line x1="420" y1="308" x2="444" y2="308" stroke="#534AB7" stroke-width="2"/>
  <text x="450" y="312" fill="#7F77DD" font-size="10">with reinforcement</text>
</svg>
